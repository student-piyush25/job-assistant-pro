{% extends 'base.html' %}
{% block content %}
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<div class="max-w-4xl mx-auto px-4 py-16 text-center">
    <h1 class="text-4xl font-extrabold text-gray-900 mb-8">CareerBoost Premium</h1>
    
    {% if current_user.is_premium %}
    <div class="bg-green-50 border border-green-200 p-8 rounded-3xl">
        <h2 class="text-2xl font-bold text-green-700">🌟 Premium Active</h2>
        <p class="text-green-600 mt-2">You have full access to all AI tools.</p>
        <a href="{{ url_for('main.dashboard') }}" class="inline-block mt-6 bg-green-600 text-white px-8 py-3 rounded-xl font-bold">Back to Dashboard</a>
    </div>
    {% else %}
    <div class="bg-white border border-gray-200 p-10 rounded-3xl shadow-xl">
        <p class="text-gray-600 mb-8 text-lg">Unlock ATS analysis and 100+ AI interview questions for just ₹49.</p>
        <button onclick="payNow()" id="pay-button" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xl px-12 py-4 rounded-2xl font-bold transition-transform hover:scale-105 shadow-lg">
            🚀 Upgrade Now @ ₹49
        </button>
    </div>
    {% endif %}
</div>

<script>
async function payNow() {
    const btn = document.getElementById('pay-button');
    btn.disabled = true;
    btn.innerText = "Processing...";

    try {
        // 1. Create the Order on the backend
        const res = await fetch("{{ url_for('dashboard.create_order') }}");
        const orderData = await res.json();

        if (orderData.error) throw new Error(orderData.error);

        // 2. Open Razorpay Checkout
        const options = {
            key: "{{ config['RAZORPAY_KEY_ID'] }}",
            amount: orderData.amount,
            currency: "INR",
            name: "CareerBoost Premium",
            description: "Full AI Access",
            order_id: orderData.id,
            handler: async function (response) {
                // 3. Verify the payment on the backend
                const verifyRes = await fetch("/payment_success", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_signature: response.razorpay_signature
                    })
                });

                const result = await verifyRes.json();
                if (result.status === "success") {
                    alert("Welcome to Premium! 🚀");
                    window.location.href = "{{ url_for('main.dashboard') }}";
                } else {
                    alert("Verification failed. Please contact support.");
                    btn.disabled = false;
                    btn.innerText = "Try Again";
                }
            },
            theme: { color: "#4F46E5" }
        };

        const rzp = new Razorpay(options);
        rzp.open();

    } catch (err) {
        alert("Error: " + err.message);
        btn.disabled = false;
        btn.innerText = "Upgrade Now @ ₹49";
    }
}
</script>
{% endblock %}
