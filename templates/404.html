{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="text-center">
        <!-- Error Code -->
        <h1 class="text-9xl font-extrabold text-indigo-600 opacity-20">404</h1>
        
        <!-- Illustration/Icon Placeholder -->
        <div class="relative -mt-20">
            <div class="text-6xl mb-4">🔍</div>
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Page Not Found</h2>
            <p class="text-gray-600 max-w-sm mx-auto mb-8">
                Sorry, we couldn't find the page you're looking for. It might have been moved or deleted.
            </p>
            
            <!-- Action Button -->
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="{{ url_for('main.index') }}" 
                   class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 transition duration-150">
                    <i class="fas fa-home mr-2"></i> Back to Home
                </a>
                <a href="{{ url_for('auth.login') }}" 
                   class="inline-flex items-center justify-center px-6 py-3 border border-gray-300 text-base font-medium rounded-lg text-gray-700 bg-white hover:bg-gray-50 transition duration-150">
                    Login
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
