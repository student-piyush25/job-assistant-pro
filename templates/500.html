{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="text-center">
        <!-- Error Code -->
        <h1 class="text-9xl font-extrabold text-red-600 opacity-10 uppercase tracking-tighter">500</h1>
        
        <!-- Content Container -->
        <div class="relative -mt-24">
            <div class="text-6xl mb-6">🛠️</div>
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Internal Server Error</h2>
            <p class="text-gray-600 max-w-md mx-auto mb-10">
                Oops! Something went wrong on our end. We're already looking into it. Please try returning to the homepage or logging back in.
            </p>
            
            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="{{ url_for('main.index') }}" 
                   class="inline-flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 transition duration-150">
                    <i class="fas fa-home mr-2"></i> Go to Homepage
                </a>
                <a href="{{ url_for('auth.login') }}" 
                   class="inline-flex items-center justify-center px-8 py-3 border border-gray-300 text-base font-medium rounded-lg text-gray-700 bg-white hover:bg-gray-50 transition duration-150">
                    <i class="fas fa-sign-in-alt mr-2"></i> Login Again
                </a>
            </div>
        </div>
    </div>
</div>


{% endblock %}
