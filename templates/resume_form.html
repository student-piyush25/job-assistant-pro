{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-10">
    
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Resume Builder</h2>
            <p class="text-gray-600">Fill in your details to generate an ATS-friendly PDF resume.</p>
        </div>
        {% if resume %}
        <div class="mt-4 md:mt-0">
            <a href="{{ url_for('resume.download_resume') }}" 
               class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none">
                <i class="fas fa-file-download mr-2"></i> Download PDF
            </a>
        </div>
        {% endif %}
    </div>

    <!-- Form Card -->
    <div class="bg-white shadow-sm border border-gray-200 rounded-xl overflow-hidden">
        <form action="{{ url_for('resume.build_resume') }}" method="POST" class="p-8 space-y-8">
            
            <!-- Personal Information -->
            <section>
                <h3 class="text-lg font-semibold text-indigo-600 border-b border-gray-100 pb-2 mb-4">Personal Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" name="full_name" value="{{ resume.full_name if resume else '' }}" required
                               placeholder="e.g. Rajesh Kumar"
                               class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" name="email" value="{{ resume.email if resume else '' }}" required
                               placeholder="rajesh@example.com"
                               class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                        <input type="text" name="phone" value="{{ resume.phone if resume else '' }}" required
                               placeholder="+91 9876543210"
                               class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
            </section>

            <!-- Education -->
            <section>
                <h3 class="text-lg font-semibold text-indigo-600 border-b border-gray-100 pb-2 mb-4">Education</h3>
                <textarea name="education" rows="3" required
                          placeholder="e.g. B.Tech in Computer Science, IIT Delhi (2020-2024) - 8.5 CGPA"
                          class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-indigo-500 focus:border-indigo-500">{{ resume.education if resume else '' }}</textarea>
            </section>

            <!-- Skills -->
            <section>
                <h3 class="text-lg font-semibold text-indigo-600 border-b border-gray-100 pb-2 mb-4">Skills</h3>
                <textarea name="skills" rows="2" required
                          placeholder="e.g. Python, Flask, SQL, React, Communication, Leadership"
                          class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-indigo-500 focus:border-indigo-500">{{ resume.skills if resume else '' }}</textarea>
            </section>

            <!-- Experience -->
            <section>
                <h3 class="text-lg font-semibold text-indigo-600 border-b border-gray-100 pb-2 mb-4">Experience / Internships</h3>
                <textarea name="experience" rows="4"
                          placeholder="e.g. Web Developer Intern at TechCorp (June 2023 - Aug 2023). Worked on..."
                          class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-indigo-500 focus:border-indigo-500">{{ resume.experience if resume else '' }}</textarea>
            </section>

            <!-- Projects -->
            <section>
                <h3 class="text-lg font-semibold text-indigo-600 border-b border-gray-100 pb-2 mb-4">Projects</h3>
                <textarea name="projects" rows="4"
                          placeholder="e.g. E-commerce Website: Built a full-stack app using Flask and SQLite..."
                          class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-indigo-500 focus:border-indigo-500">{{ resume.projects if resume else '' }}</textarea>
            </section>

            <!-- Submit Button -->
            <div class="pt-6 border-t border-gray-100">
                <button type="submit" 
                        class="w-full md:w-auto px-10 py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition duration-150">
                    Save Resume Details
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
