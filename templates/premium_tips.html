{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto py-12 px-6">
    <h2 class="text-3xl font-bold mb-6 text-indigo-700">🚀 Premium Resume Tips</h2>
    <div class="bg-white shadow-xl rounded-2xl p-8 border border-indigo-100">
        <ul class="space-y-4">
            {% for tip in tips %}
            <li class="flex items-start">
                <span class="text-green-500 mr-3">✔</span>
                <span class="text-gray-700 text-lg">{{ tip }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
    <div class="mt-8 text-center">
        <a href="{{ url_for('main.dashboard') }}" class="text-indigo-600 font-semibold">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}
